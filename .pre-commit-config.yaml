# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: trailing-whitespace
    exclude: testing/baselines
  - id: end-of-file-fixer
    exclude: testing/baselines
  - id: check-yaml
  - id: check-added-large-files
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: a27a2e47c7751b639d2b5badf0ef6ff11fee893f  # frozen: v0.15.4
  hooks:
    - id: ruff
      args: [--fix]
    - id: ruff-format

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: a66e98df7b4aeeb3724184b332785976d062b92e  # frozen: v1.19.1
  hooks:
  - id: mypy
    args: [--strict]
    additional_dependencies:
      - "argcomplete>=3.6.2"
      - "GitPython>=3.1.43"
      - "semantic_version>=2.10.0"
      - "types-docutils>=0.21.0.20250809"
      - "types-setuptools>=80.9.0.20250809"
      - "pytest>=9.0.3"
    exclude: "doc/.*"
