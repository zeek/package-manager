# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: trailing-whitespace
    exclude: testing/baselines
  - id: end-of-file-fixer
    exclude: testing/baselines
  - id: check-yaml
  - id: check-added-large-files
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 3b3f7c3f57fe9925356faf5fe6230835138be230  # frozen: v0.15.17
  hooks:
    - id: ruff-check
      args: [--fix]
    - id: ruff-format

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0
  hooks:
  - id: mypy
    args: [--strict]
    additional_dependencies:
      - "argcomplete>=3.6.3"
      - "GitPython>=3.1.43"
      - "nab-resolver>=0.0.11"
      - "semantic_version>=2.10.0"
      - "types-docutils>=0.21.0.20250809"
      - "types-setuptools>=80.9.0.20250809"
      - "pytest>=9.0.3"
    exclude: "doc/.*"

- repo: https://github.com/cheshirekow/cmake-format-precommit
  rev: e2c2116d86a80e72e7146a06e68b7c228afc6319  # frozen: v0.6.13
  hooks:
  - id: cmake-format
  - id: cmake-lint
